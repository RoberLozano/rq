<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>Static Template</title>
    <link rel="stylesheet" href="src/styles.css" />
    <style>
        html,
body {
  font-family: Avenir, Helvetica, Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow: hidden;
  width: 100%;
  height: 100%;
  margin: 0;
  padding: 0;
  position: relative;
  text-align: center;
}

#dice-box {
  position: absolute;
  top: 0;
  left: 0;
  box-sizing: border-box;
  width: 100%;
  height: 100%;
  background-image: url(/public/assets/woodgrain2.jpg);
  background-size: cover;
}

#dice-box canvas {
  width: 100%;
  height: 100%;
  z-index: 1;
}

h1,
button#rollem {
  position: relative;
  z-index: 2;
}

button#rollem {
  cursor: pointer;
}

    </style>
  </head>
  <body>
    <h1>
      This is a static template, there is no bundler or bundling involved!
    </h1>
    <div>
      <button id="rollem">Roll em!</button>
    </div>
    <div id="dice-box"></div>
    <script type="module">
        import DiceBox from "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/dice-box.es.min.js";

let Box = new DiceBox({
  assetPath: "assets/",
  origin: "https://unpkg.com/@3d-dice/dice-box@1.1.3/dist/",
  container: "#dice-box",
  theme: "diceOfRolling",
  themeColor: "#feea03",
  externalThemes: {
    diceOfRolling: "https://www.unpkg.com/@3d-dice/theme-dice-of-rolling@0.2.1",
  },
  offscreen: true,
  scale: 6,
  // physics settings that must be set - defaults are buggy
  throwForce: 5,
  gravity: 1,
  mass: 1,
  spinForce: 6,
});

Box.init().then(async (world) => {
  // No lanzar dados automáticamente al iniciar
  console.log("DiceBox inicializado");
});


function calcularDados(n) {
  if (n === 100) return { decenas: 0, unidades: 0 };
  return {
    decenas: Math.floor(n / 10),
    unidades: n % 10
  };
}

async function lanzar() {
  // Esta función ya no se usa, se elimina para evitar confusiones
}


const button = document.getElementById("rollem");

const colors = [
  "#348888",
  "#22BABB",
  "#9EF8EE",
  "#FA7F08",
  "#F24405",
  "#F25EB0",
  "#B9BF04",
  "#F2B705",
  "#F27405",
  "#F23005",
];

const scale = [2, 3, 4, 5, 6, 7, 8];

function get_random(list) {
  return list[Math.floor(Math.random() * list.length)];
}

button.addEventListener("click", (e) => {
  Box.updateConfig({
    scale: 6,
  });
  
  // Valor fijo para sincronización entre dispositivos
  const resultado = 77;
  const { decenas, unidades } = calcularDados(resultado);
  
  Box.roll([
    { sides: 10, value: unidades },
    { sides: 10, value: decenas, isPercentile: true }
  ]);

//   Box.roll(["4d20", "4d12", "4d10", "4d8", "4d6", "4d4"], {
//     themeColor: get_random(colors),
//   });

});

// lanzar(); // Comentado para evitar ejecución automática

    </script>
  </body>
</html>
